name: audio-transcript

x-gpu: &gpu
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            count: all
            capabilities: [gpu]

x-backend-env: &backend-env
  WHISPER_API_URL: "http://whisper:9000"
  OLLAMA_API_URL: "http://ollama:11434"
  QDRANT_API_HOST: "qdrant"
  QDRANT_API_PORT_GRPC: "6334"
  POSTGRES_URL: "postgres:5432"
  POSTGRES_USER: "${POSTGRES_USER}"
  POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
  POSTGRES_DB: "${POSTGRES_DB}"
  LLM_MODEL: "${LLM_MODEL}"
  EMBEDDING_MODEL: "${EMBEDDING_MODEL}"
  EMBEDDING_MODEL_DIM: "${EMBEDDING_MODEL_DIM}"
  LOG_LEVEL: "${LOG_LEVEL:-info}"
  FAST_INGEST_MODE: "${FAST_INGEST_MODE:-true}"
  DEACTIVATE_LLM: "${DEACTIVATE_LLM:-true}"

services:
  qdrant:
    image: "qdrant/qdrant:${QDRANT_TAG}"
    restart: unless-stopped
    volumes:
      - qdrant-data:/qdrant/storage
    # Nur freigeben, wenn du vom Host drauf willst
    ports:
      - "6333:6333"
      - "6334:6334"

  postgres:
    image: "postgres:${POSTGRES_TAG}"
    restart: unless-stopped
    environment:
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DB: "${POSTGRES_DB}"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  whisper:
    image: "evilfreelancer/whisper-server:${WHISPER_TAG}"
    restart: unless-stopped
    environment:
      WHISPER_MODEL: "${WHISPER_MODEL}"
      WHISPER_MODEL_QUANTIZATION: "${WHISPER_MODEL_QUANTIZATION}"
    volumes:
      - whisper-models:/app/models
    ports:
      - "9001:9000"
      - "9002:8080"
    <<: *gpu

  ollama:
    image: "ollama/ollama:${OLLAMA_TAG}"
    restart: unless-stopped
    volumes:
      - ollama-data:/root/.ollama
    ports:
      - "8884:11434"
    <<: *gpu

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      ollama:
        condition: service_started
      whisper:
        condition: service_started
    environment:
      <<: *backend-env
    ports:
      - "8880:8880"
    volumes:
      - backend-audios:/app/downloaded_audios

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    environment:
      PORT: "7860"
      AUDIO_TRANSCRIPT_SERVER_URL: "http://api:8880"
      FRONTEND_SERVER_URL: "http://frontend:7860"
      POSTGRES_URL: "${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}"
      DATA_DIR: "/app/data"
      FILE_CLEAN_UP: "${FILE_CLEAN_UP:-300}"
    ports:
      - "7860:7860"
    volumes:
      - frontend-data:/app/data

volumes:
  qdrant-data:
  postgres-data:
  whisper-models:
  ollama-data:
  backend-audios:
  frontend-data: